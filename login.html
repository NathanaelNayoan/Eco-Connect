<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EcoConnect</title>
    <!-- Menghubungkan CSS -->
    <link rel="stylesheet" href="css/login.css">
    <!-- Font Awesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body onload="hilangkanLoading()">

    <!-- 1. LOADING SCREEN -->
    <div id="loader" class="loader-wrapper">
        <div class="loader"></div>
    </div>

    <!-- 2. NAVBAR ATAS (Pojok Kanan Atas Transisi) -->
    <nav class="top-nav">
        <div class="logo">
            <i class="fa-solid fa-leaf" style="color: #00E65B;"></i> EcoConnect
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-item">Home</a>
            <a href="about.html" class="nav-item">About</a>
            <a href="login.html" class="btn-nav-login">Login</a>
        </div>
    </nav>

    <!-- 3. CONTAINER FORM LOGIN -->
    <div class="login-container">
        <div class="login-header">
            <h2>Selamat Datang</h2>
            <p>Kelola limbahmu, dapatkan Eco-Coins.</p>
        </div>

        <!-- Toggle Pilihan Peran -->
        <div class="role-toggle">
            <button class="toggle-btn active" id="btn-user" onclick="setRole('user')">User</button>
            <button class="toggle-btn" id="btn-admin" onclick="setRole('admin')">Admin</button>
        </div>

        <!-- Kartu Form -->
        <div class="login-card">
            <!-- MENGGUNAKAN FORM UNTUK VALIDASI PESAN KUSTOM -->
            <form onsubmit="prosesLogin(event)">

                <!-- Input Email/No HP -->
                <div class="input-group">
                    <label>Email atau Nomor Ponsel</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="text" id="username" placeholder="Masukkan email atau no. hp" required
                            oninvalid="this.setCustomValidity('Harap masukkan email atau nomor ponsel Anda')"
                            oninput="this.setCustomValidity('')">
                    </div>
                </div>

                <!-- Input Password -->
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <!-- Gabungan validasi kustom dan fungsi muncul mata -->
                        <input type="password" id="password" placeholder="Masukkan kata sandi" required
                            oninvalid="this.setCustomValidity('Harap masukkan kata sandi Anda')"
                            oninput="this.setCustomValidity(''); cekInputPassword()">

                        <!-- Ikon Mata: Muncul secara dinamis melalui login.js -->
                        <i class="fa-solid fa-eye eye-icon" id="eye-icon" style="display: none;"
                            onclick="togglePassword()"></i>
                    </div>
                </div>

                <div class="forgot-password">
                    <a href="reset.html">Lupa Password?</a>
                </div>

                <!-- Tombol Login (Tanpa Panah) -->
                <button type="submit" class="btn-submit">Login</button>

                <div class="register-link">
                    Belum punya akun? <a href="register.html">Daftar disini</a>
                </div>
            </form>
        </div>

        <!-- Footer Kecil -->
        <div class="footer-text">
            <i class="fa-solid fa-recycle" style="color:#00E65B"></i> Powered by EcoConnect ID
        </div>
    </div>

    <!-- 4. MEMANGGIL JAVASCRIPT -->
    <script src="js/login.js"></script>
</body>

</html>
